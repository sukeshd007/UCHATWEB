<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- PWA Core -->
  <meta name="application-name" content="UChat" />
  <meta name="description" content="UChat — Connect, Share, and Chat with the world." />
  <link rel="manifest" href="/manifest.json" />

  <!-- Theme colors (dark / light) -->
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

  <!-- Android / Chrome -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="color-scheme" content="dark light" />

  <!-- iOS Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="UChat" />

  <!-- Splash / icons -->
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="UChat" />
  <meta property="og:description" content="Connect, Share, and Chat with the world." />
  <meta property="og:image" content="/icons/og-image.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <title>UChat</title>

  <style>
    /* Critical CSS — prevents FOUC */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      scroll-behavior: smooth;
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      height: 100%;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      min-height: 100%;
      min-height: 100dvh;
      overflow-x: hidden;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }
    #root { min-height: 100dvh; display: flex; flex-direction: column; }
    /* Install prompt hide until loaded */
    #pwa-install { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- PWA install prompt (managed by JS) -->
  <div id="pwa-install"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
