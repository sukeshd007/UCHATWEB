<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <linearGradient id="safe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Maskable safe zone background (full bleed for Android) -->
  <rect width="512" height="512" rx="0" fill="url(#grad)"/>
  <!-- Icon rounded rect (safe area) -->
  <rect x="64" y="64" width="384" height="384" rx="96" fill="url(#safe)" opacity="0.3"/>
  <!-- Letter U -->
  <text
    x="256"
    y="340"
    font-family="'Sora', 'Inter', Arial, sans-serif"
    font-weight="800"
    font-size="260"
    text-anchor="middle"
    fill="white"
    letter-spacing="-8"
  >U</text>
  <!-- Dot accent -->
  <circle cx="340" cy="170" r="28" fill="white" opacity="0.9"/>
</svg>
